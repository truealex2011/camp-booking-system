services:
  - type: web
    name: camp-booking-system
    env: python
    buildCommand: pip install -r requirements.txt && python init_db.py
    startCommand: gunicorn run:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.9
